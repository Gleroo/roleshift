# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: ./

jobs:
# Please do not rename this job
  build-project:
    name: build roleshift
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Create API config
        run: |
          echo "<?php" > api/roleshift_config.php
          echo "define('GEMINI_API_KEY', '${{ secrets.GEMINI_API_KEY }}');" >> api/roleshift_config.php
          echo "define('GEMINI_MODEL',   'gemini-2.5-flash');" >> api/roleshift_config.php

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-eu.ionos.space
          project-id: 4a38bce8-88e4-4c42-9704-3796a202677d
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/roleshift/config.yaml
          action: upload
